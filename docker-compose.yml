version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: wa_agent_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa_agent_backend
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      - mongo

volumes:
  mongo_data:
